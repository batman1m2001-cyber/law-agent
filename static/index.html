<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Obligation Extractor</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Legal Obligation Extractor</h1>
      <span class="badge">Powered by Hush AI</span>
    </header>

    <!-- Upload -->
    <div class="upload-area" id="dropZone">
      <input type="file" id="fileInput" accept=".doc,.docx">
      <div class="icon">📄</div>
      <div>Drop .doc / .docx file here</div>
      <div class="hint">or click to browse</div>
      <div class="file-name" id="fileName"></div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="btnExtract" disabled>Extract</button>
      <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
      <button class="btn btn-secondary" id="btnRetry" disabled>Retry Failed</button>
      <button class="btn btn-secondary" id="btnExcel" disabled>Download Excel</button>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span id="progressLabel"></span>
        <span class="count" id="progressCount">0/0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Articles -->
    <div class="articles-section" id="articlesSection">
      <h2>Articles</h2>
      <div class="article-list" id="articleList"></div>
    </div>

    <!-- Article detail panel -->
    <div class="detail-section" id="detailSection">
      <h2 id="detailTitle">Detail</h2>
      <div class="detail-tabs">
        <button class="tab active" data-tab="obligations" id="tabObligations">Obligations</button>
        <button class="tab" data-tab="content" id="tabContent">Article Text</button>
        <button class="tab" data-tab="classified" id="tabClassified">Classify JSON</button>
      </div>
      <div class="tab-panel" id="panelObligations"></div>
      <div class="tab-panel" id="panelContent" style="display:none"></div>
      <div class="tab-panel" id="panelClassified" style="display:none"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
